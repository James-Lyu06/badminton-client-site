<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Badminton Motion-Analysis Product Survey</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="siteHeader">
    <div>
      <p class="eyebrow">Badminton research survey</p>
      <h1>Badminton Motion-Analysis Product Survey</h1>
    </div>
  </header>

  <main class="page">
    <section class="panel introPanel">
      <div>
        <h2>Questionnaire</h2>
        <p class="muted">Please answer the following questions based on your badminton experience. Required questions are marked with an asterisk.</p>
      </div>
      <span class="pill" id="questionCount"></span>
    </section>

    <section class="panel">
      <form id="clientForm" class="form"></form>
    </section>
  </main>

  <div id="successModal" class="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>Thank you</h2>
      <p>Your questionnaire has been submitted successfully.</p>
      <button id="closeSuccessModal" type="button">Close</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="config.js"></script>
  <script src="schema.js"></script>
  <script src="data-service.js"></script>
  <script src="client.js"></script>
</body>
</html>
