<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuraSense Feedback Sites</title>
  <link rel="stylesheet" href="shared/styles.css" />
</head>
<body class="gateway">
  <main class="gatewayLayout">
    <p class="eyebrow">AuraSense Badminton Study</p>
    <h1>AuraSense Feedback Sites</h1>
    <p class="muted">The prototype is now split into two independent website entries.</p>
    <div class="gatewayActions">
      <a class="button" href="client/index.html">Client questionnaire</a>
      <a class="button secondary" href="admin/index.html">Research dashboard</a>
    </div>
    <section class="panel qrPanel">
      <div>
        <p class="eyebrow">Client access</p>
        <h2>Questionnaire QR code</h2>
        <p class="muted small">Use this after the site is hosted. The QR code points directly to the client questionnaire page.</p>
        <input id="clientUrlInput" class="urlInput" readonly />
      </div>
      <img id="clientQr" class="qrImage" alt="Client questionnaire QR code" />
    </section>
  </main>
  <script>
    const clientUrl = new URL("client/index.html", window.location.href).href;
    document.querySelector("#clientUrlInput").value = clientUrl;
    document.querySelector("#clientQr").src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(clientUrl)}`;
  </script>
</body>
</html>
