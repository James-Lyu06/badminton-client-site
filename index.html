<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Badminton Motion-Analysis Product Survey</title>
  <link rel="stylesheet" href="styles.css?v=20260712-3" />
</head>
<body>
  <header class="siteHeader">
    <div>
      <p id="eyebrow" class="eyebrow">Badminton research survey</p>
      <h1 id="pageHeading">Badminton Motion-Analysis Product Survey</h1>
    </div>
    <button id="languageToggle" class="secondary" type="button">中文</button>
  </header>

  <main class="page">
    <section class="panel introPanel">
      <div>
        <h2 id="formHeading">Questionnaire</h2>
        <p id="formIntro" class="muted">Please answer the following questions based on your badminton experience. Required questions are marked with an asterisk.</p>
      </div>
      <span class="pill" id="questionCount"></span>
    </section>

    <section class="panel">
      <form id="clientForm" class="form"></form>
    </section>
  </main>

  <div id="successModal" class="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="successHeading">
    <div class="modal">
      <h2 id="successHeading">Thank you</h2>
      <p id="successText">Your questionnaire has been submitted successfully.</p>
      <button id="closeSuccessModal" type="button">Close</button>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="config.js?v=20260712-3"></script>
  <script src="schema.js?v=20260712-3"></script>
  <script src="translations.js?v=20260712-3"></script>
  <script src="data-service.js?v=20260712-3"></script>
  <script src="client.js?v=20260712-3"></script>
</body>
</html>
